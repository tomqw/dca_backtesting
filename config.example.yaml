# DCA Backtesting Configuration
# Copy this file to config.yaml and customize as needed.
# config.yaml is gitignored and will not be tracked in version control.

paths:
  data_dir: "data/"
  results_dir: "results/"

data:
  # Binance API settings
  binance_api_url: "https://api.binance.com/api/v3/klines"
  interval: "1m"
  api_limit: 1500
  # Trading pairs (comma-separated)
  pairs: "SOLUSDT,LUNAUSDT,AVAXUSDT,ADAUSDT"
  
  # Alternative Set 1: 25 pairs with full data from 2021-01-01 to 2026-06-01
  # pairs: "COTIUSDT,SCUSDT,HIVEUSDT,FILUSDT,BANDUSDT,TRXUSDT,QTUMUSDT,XRPUSDT,CRVUSDT,SKLUSDT,BCHUSDT,KNCUSDT,HOTUSDT,DUSKUSDT,DOGEUSDT,RUNEUSDT,ETCUSDT,MTLUSDT,RLCUSDT,VTHOUSDT,DOTUSDT,ENJUSDT,BNBUSDT,NEARUSDT,UMAUSDT"
  
  # Alternative Set 2: 25 pairs with full data from 2021-01-01 to 2026-06-01
  # pairs: "SOLUSDT,ZECUSDT,NMRUSDT,ETHUSDT,UNIUSDT,AUDIOUSDT,LTCUSDT,EGLDUSDT,STORJUSDT,BELUSDT,AAVEUSDT,CVCUSDT,SUSHIUSDT,HBARUSDT,SANDUSDT,FTTUSDT,THETAUSDT,NEOUSDT,BTCUSDT,XTZUSDT,SNXUSDT,MANAUSDT,KAVAUSDT,XLMUSDT,CHZUSDT"

backtest:
  # Trading fee applied to every buy/sell (in percent).
  trading_fee_percent: 0.075
